---
layout: default
---

<div class="blog-layout">
  <aside class="glass-box blog-sidebar">
    <div class="blog-search-box">
      <label for="blog-search">{% if page.lang == 'en' %}Search posts{% else %}Pesquisar por posts{% endif %}</label>
      <input id="blog-search" type="search" placeholder="{% if page.lang == 'en' %}Search...{% else %}Ex.: produtividade, planejamento{% endif %}">
      <p id="blog-search-feedback" class="blog-search-feedback"></p>
    </div>
    <div id="blog-index"></div>
  </aside>

  <section class="blog-main">
    <main class="content-area">
      <article class="glass-box post">
        <header>
          <h1>{{ page.title }}</h1>
          <p class="post-meta">{{ page.date | date: "%d %B %Y" }}</p>
        </header>
        <section class="post-content">
          {{ content }}
        </section>

        <footer class="post-footer">
          <h3>{% if page.lang == 'en' %}Other posts{% else %}Outros posts{% endif %}</h3>
          <ul class="related-posts">
            {% for post in site.posts limit:5 %}
              {% if post.url != page.url %}
                <li><a href="{{ post.url | relative_url }}">{{ post.title }}</a></li>
              {% endif %}
            {% endfor %}
          </ul>
        </footer>
      </article>
    </main>
  </section>
</div>
