---
layout: default
title: Blog
permalink: /blog/
---

<header class="main-header">
    <h1 class="ff-title">BLOG</h1>
    <p class="subtitle">Ideias, projetos e notas de trabalho</p>
</header>

<main class="content-area">
    <div class="blog-toolbar">
        <div class="glass-box blog-search-box">
            <label for="blog-search">Pesquisar por palavras-chave</label>
            <input id="blog-search" type="search" placeholder="Ex.: produtividade, comunica&ccedil;&atilde;o, planejamento">
            <p id="blog-search-feedback" class="blog-search-feedback"></p>
        </div>
    </div>

    <div class="blog-layout">
        <aside class="glass-box blog-sidebar">
            <h2>&Iacute;ndice por data</h2>
            <div id="blog-index"></div>
        </aside>

        <section class="blog-main">
            <div id="blog-posts"></div>
        </section>
    </div>
</main>

<script>
window.SITE_POSTS = [
{% assign posts_pt = site.posts | where_exp: "post", "post.lang != 'en'" %}
{% for post in posts_pt %}
    {
        title: {{ post.title | jsonify }},
        url: {{ post.url | relative_url | jsonify }},
        date: "{{ post.date | date: "%Y-%m-%d"}}",
        summary: {{ post.excerpt | strip_html | strip_newlines | jsonify }},
        tags: [{% for tag in post.tags %}{{ tag | jsonify }}{% unless forloop.last %}, {% endunless %}{% endfor %}]
    }{% unless forloop.last %}, {% endunless %}
{% endfor %}
];
</script>
