---
layout: default
title: "Blog — EN"
lang: en
permalink: /en/blog/
---

<header class="main-header">
    <h1 class="ff-title">BLOG</h1>
    <p class="subtitle">Ideas, projects and work notes</p>
</header>

<main class="content-area">
    <div class="blog-toolbar">
        <div class="glass-box blog-search-box">
            <label for="blog-search">Search by keywords</label>
            <input id="blog-search" type="search" placeholder="Ex.: productivity, workflow, planning">
            <p id="blog-search-feedback" class="blog-search-feedback"></p>
        </div>
    </div>

    <div class="blog-layout">
        <aside class="glass-box blog-sidebar">
            <h2>Index by date</h2>
            <div id="blog-index"></div>
        </aside>

        <section class="blog-main">
            <div id="blog-posts"></div>
        </section>
    </div>
</main>

<script>
window.SITE_POSTS = [
{% assign posts_en = site.posts | where: "lang", "en" %}
{% for post in posts_en %}
    {
        title: {{ post.title | jsonify }},
        url: {% if post.permalink %}{{ post.permalink | relative_url | jsonify }}{% else %}{{ post.url | relative_url | jsonify }}{% endif %},
        date: "{{ post.date | date: "%Y-%m-%d"}}",
        summary: {{ post.excerpt | strip_html | strip_newlines | jsonify }},
        tags: [{% for tag in post.tags %}{{ tag | jsonify }}{% unless forloop.last %}, {% endunless %}{% endfor %}]
    }{% unless forloop.last %}, {% endunless %}
{% endfor %}
];
</script>
